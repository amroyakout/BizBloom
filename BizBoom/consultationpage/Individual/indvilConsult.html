<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="indivConsult.css">


    <title>Individual Consult</title>


</head>
<body>
    <h1>Individual Consultation</h1>
    <p>Welcome to the Individual Consultation page. Here you can schedule a one-on-one consultation with our experts to discuss your specific needs and receive personalized advice.</p>
    
    <form>
        <h1>Contact Info</h1>

        <label for="nameInput">Name:</label>
        <input type="text" id="nameInput" placeholder="John Doe" required>

        <br><br>

        <label for="emailInput">E-Mail:</label>
        <input type="email" id="emailInput" placeholder="JohnDoe1@doemail.com" required>

        <br><br>

        <label for="phoneInput">Phone Number:</label>
        <input type="tel" id="phoneInput" placeholder="+4407123456789" required>

        <br><br>

        <h1>Other Info</h1>

        <label for="preferredDate">Preferred Date:</label>
        <input type="date" id="preferredDate" required>
        
        <label for="preferredTime">Preferred Time:</label>
        <input type="time" id="preferredTime" required>

        <br><br>

        <label for="breifInput">Short Breif:</label>
        <textarea id="breifInput" placeholder="I want a website for my barber business, with a complete booking system and reviews page." required></textarea>
    </form>
</body>
</html>
