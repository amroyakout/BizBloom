<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="consult.css">


    <title>Individual Consult</title>


</head>
<body>
    
<div class="navbar">
    <h1 class="logo">BizzBloom</h1>
</div>

<div id="preSubmit">

    <h1>Individual Consultation</h1>
    <p>Welcome to the Consultation page. Here you can schedule a one-on-one consultation with our experts to discuss your specific needs and receive personalized advice.</p>
    
    <form id="detailsForm">
        <h1>Contact Info</h1>

        <label for="nameInput">Name:</label>
        <input type="text" id="nameInput" placeholder="John Doe" required>

        <br><br>

        <label for="emailInput">E-Mail:</label>
        <input type="email" id="emailInput" placeholder="JohnDoe1@doemail.com" required>

        <br><br>

        <label for="phoneInput">Phone Number:</label>
        <input type="tel" id="phoneInput" placeholder="+4407123456789" required>

        <br><br>

        <h1>Other Info</h1>

        <label for="preferredDate">Preferred Date:</label>
        <input type="date" id="preferredDate" required>
        
        <label for="preferredTime">Preferred Time:</label>
        <input type="time" id="preferredTime" required>

        <br><br>

        <label for="briefInput">Short Brief:</label>
        <textarea id="briefInput" placeholder="I want a website for my barber business, with a complete booking system and reviews page." required></textarea>

        <br><br>

        <button id="submitBtn">Submit</button>

    </form>
</div>
    <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
    <script src="consult.js"></script>
</body>
</html>
